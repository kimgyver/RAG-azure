name: Infra + Functions Deploy

on:
  workflow_dispatch:
    inputs:
      terraform_apply:
        description: "Run terraform apply"
        required: true
        default: true
        type: boolean
      publish_functions:
        description: "Build and publish Azure Functions"
        required: true
        default: true
        type: boolean
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - "backend/functions-ingestion/**"
      - ".github/workflows/infra-functions-deploy.yml"

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: "true"
      TF_VAR_app_service_plan_sku: "Y1"
      TF_VAR_project_name: ${{ vars.TF_PROJECT_NAME || 'ragapp' }}
      TF_VAR_name_suffix: ${{ vars.TF_NAME_SUFFIX }}
      TF_VAR_allowed_tenant_ids: ${{ vars.ALLOWED_TENANT_IDS_JSON || '["tenant-a","tenant-b"]' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate AZURE_CREDENTIALS secret
        run: |
          if [ -z '${{ secrets.AZURE_CREDENTIALS }}' ]; then
            echo "::error::Missing GitHub secret AZURE_CREDENTIALS"
            exit 1
          fi

          echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -e '.clientId and .clientSecret and .subscriptionId and .tenantId' >/dev/null || {
            echo "::error::AZURE_CREDENTIALS must be a JSON object with keys: clientId, clientSecret, subscriptionId, tenantId"
            exit 1
          }

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Resolve Static Web App origin for Terraform CORS
        shell: bash
        env:
          SWA_ORIGIN_FROM_VAR: ${{ vars.STATIC_WEB_APP_ORIGIN }}
        run: |
          set -euo pipefail

          ORIGIN="${SWA_ORIGIN_FROM_VAR:-}"
          ORIGIN="${ORIGIN%/}"

          if [ -z "$ORIGIN" ]; then
            SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
            PROJECT_RAW="${TF_VAR_project_name:-ragapp}"
            SLUG="$(echo "$PROJECT_RAW" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9' | cut -c1-14)"
            if [ -z "$SLUG" ]; then
              SLUG="app"
            fi

            if [ -n "${TF_VAR_name_suffix:-}" ]; then
              NAME_SUFFIX="$(echo "$TF_VAR_name_suffix" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9' | cut -c1-8)"
            else
              NAME_SUFFIX="$(printf '%s' "${SUBSCRIPTION_ID}:${SLUG}" | md5sum | cut -c1-8)"
            fi

            SWA_NAME="${SLUG}-${NAME_SUFFIX}-swa"
            SWA_RG="${SLUG}-${NAME_SUFFIX}-rg"

            if az staticwebapp show --name "$SWA_NAME" --resource-group "$SWA_RG" >/dev/null 2>&1; then
              HOSTNAME="$(az staticwebapp show --name "$SWA_NAME" --resource-group "$SWA_RG" --query defaultHostname -o tsv)"
              if [ -n "$HOSTNAME" ]; then
                ORIGIN="https://$HOSTNAME"
              fi
            fi
          fi

          if [ -n "$ORIGIN" ]; then
            echo "TF_VAR_static_web_app_origin=$ORIGIN" >> "$GITHUB_ENV"
            echo "Resolved static web app origin for CORS: $ORIGIN"
          else
            echo "::warning::Could not resolve static web app origin. Set repository variable STATIC_WEB_APP_ORIGIN to keep Function/Blob CORS aligned."
          fi

      - name: Resolve Linux App Service plan for quota-limited subscriptions
        shell: bash
        env:
          PLAN_ID_FROM_VAR: ${{ vars.EXISTING_LINUX_SERVICE_PLAN_RESOURCE_ID }}
        run: |
          set -euo pipefail

          PLAN_ID="${PLAN_ID_FROM_VAR:-}"
          if [ -n "$PLAN_ID" ]; then
            echo "Using EXISTING_LINUX_SERVICE_PLAN_RESOURCE_ID from repository variable"
            echo "TF_VAR_existing_linux_service_plan_resource_id=$PLAN_ID" >> "$GITHUB_ENV"
            exit 0
          fi

          PLAN_ID="$(az appservice plan list --query "[?reserved==\`true\`].id | [0]" -o tsv)"
          if [ -n "$PLAN_ID" ]; then
            echo "Using first discovered Linux App Service plan in subscription"
            echo "TF_VAR_existing_linux_service_plan_resource_id=$PLAN_ID" >> "$GITHUB_ENV"
          else
            echo "No existing Linux App Service plan discovered. Terraform will attempt new Y1 plan creation."
            echo "If quota error persists, set repository variable EXISTING_LINUX_SERVICE_PLAN_RESOURCE_ID."
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Resolve optional runtime app settings for Terraform
        shell: bash
        env:
          SEARCH_ENDPOINT_FROM_VAR: ${{ vars.SEARCH_ENDPOINT }}
          SEARCH_INDEX_NAME_FROM_VAR: ${{ vars.SEARCH_INDEX_NAME }}
          SEARCH_API_KEY_FROM_SECRET: ${{ secrets.SEARCH_API_KEY }}
          COSMOS_ENDPOINT_FROM_VAR: ${{ vars.COSMOS_ENDPOINT }}
          COSMOS_KEY_FROM_SECRET: ${{ secrets.COSMOS_KEY }}
          OPENAI_API_KEY_FROM_SECRET: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL_FROM_VAR: ${{ vars.OPENAI_MODEL }}
        run: |
          set -euo pipefail

          EXTRA='{}'

          SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
          PROJECT_RAW="${TF_VAR_project_name:-ragapp}"
          SLUG="$(echo "$PROJECT_RAW" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9' | cut -c1-14)"
          if [ -z "$SLUG" ]; then
            SLUG="app"
          fi

          if [ -n "${TF_VAR_name_suffix:-}" ]; then
            NAME_SUFFIX="$(echo "$TF_VAR_name_suffix" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9' | cut -c1-8)"
          else
            NAME_SUFFIX="$(printf '%s' "${SUBSCRIPTION_ID}:${SLUG}" | md5sum | cut -c1-8)"
          fi

          RG_NAME="${SLUG}-${NAME_SUFFIX}-rg"
          FUNCTION_APP_NAME="${SLUG}-${NAME_SUFFIX}-fn"

          EXISTING_SETTINGS='[]'
          if az functionapp show --name "$FUNCTION_APP_NAME" --resource-group "$RG_NAME" >/dev/null 2>&1; then
            EXISTING_SETTINGS="$(az functionapp config appsettings list --name "$FUNCTION_APP_NAME" --resource-group "$RG_NAME" --query "[?name=='SEARCH_ENDPOINT'||name=='SEARCH_API_KEY'||name=='SEARCH_INDEX_NAME'||name=='COSMOS_ENDPOINT'||name=='COSMOS_KEY'||name=='OPENAI_API_KEY'||name=='OPENAI_MODEL'].[name,value]" -o json)"
            echo "Using current Function App settings as fallback when repo vars/secrets are missing."
          fi

          get_existing_setting() {
            local setting_name="$1"
            jq -r --arg n "$setting_name" '.[] | select(.[0] == $n) | .[1]' <<<"$EXISTING_SETTINGS" | head -n 1
          }

          SEARCH_ENDPOINT_VALUE="${SEARCH_ENDPOINT_FROM_VAR:-$(get_existing_setting SEARCH_ENDPOINT)}"
          SEARCH_API_KEY_VALUE="${SEARCH_API_KEY_FROM_SECRET:-$(get_existing_setting SEARCH_API_KEY)}"
          SEARCH_INDEX_NAME_VALUE="${SEARCH_INDEX_NAME_FROM_VAR:-$(get_existing_setting SEARCH_INDEX_NAME)}"
          if [ -z "$SEARCH_INDEX_NAME_VALUE" ]; then
            SEARCH_INDEX_NAME_VALUE="rag-chunks"
          fi

          if [ -n "$SEARCH_ENDPOINT_VALUE" ] && [ -n "$SEARCH_API_KEY_VALUE" ]; then
            echo "::add-mask::${SEARCH_API_KEY_VALUE}"
            EXTRA="$(jq -cn \
              --argjson base "$EXTRA" \
              --arg endpoint "$SEARCH_ENDPOINT_VALUE" \
              --arg key "$SEARCH_API_KEY_VALUE" \
              --arg index "$SEARCH_INDEX_NAME_VALUE" \
              '$base + {SEARCH_ENABLED:"true", SEARCH_ENDPOINT:$endpoint, SEARCH_API_KEY:$key, SEARCH_INDEX_NAME:$index}')"
            echo "Prepared SEARCH_* settings for Terraform app_settings merge."
          fi

          COSMOS_ENDPOINT_VALUE="${COSMOS_ENDPOINT_FROM_VAR:-$(get_existing_setting COSMOS_ENDPOINT)}"
          COSMOS_KEY_VALUE="${COSMOS_KEY_FROM_SECRET:-$(get_existing_setting COSMOS_KEY)}"

          if [ -n "$COSMOS_ENDPOINT_VALUE" ] && [ -n "$COSMOS_KEY_VALUE" ]; then
            echo "::add-mask::${COSMOS_KEY_VALUE}"
            EXTRA="$(jq -cn \
              --argjson base "$EXTRA" \
              --arg endpoint "$COSMOS_ENDPOINT_VALUE" \
              --arg key "$COSMOS_KEY_VALUE" \
              '$base + {COSMOS_DB_ENABLED:"true", COSMOS_ENDPOINT:$endpoint, COSMOS_KEY:$key}')"
            echo "Prepared COSMOS_* settings for Terraform app_settings merge."
          fi

          OPENAI_API_KEY_VALUE="${OPENAI_API_KEY_FROM_SECRET:-$(get_existing_setting OPENAI_API_KEY)}"
          OPENAI_MODEL_VALUE="${OPENAI_MODEL_FROM_VAR:-$(get_existing_setting OPENAI_MODEL)}"
          if [ -z "$OPENAI_MODEL_VALUE" ]; then
            OPENAI_MODEL_VALUE="gpt-4o-mini"
          fi

          if [ -n "$OPENAI_API_KEY_VALUE" ]; then
            echo "::add-mask::${OPENAI_API_KEY_VALUE}"
            EXTRA="$(jq -cn \
              --argjson base "$EXTRA" \
              --arg key "$OPENAI_API_KEY_VALUE" \
              --arg model "$OPENAI_MODEL_VALUE" \
              '$base + {OPENAI_API_KEY:$key, OPENAI_MODEL:$model}')"
            echo "Prepared OPENAI_* settings for Terraform app_settings merge."
          fi

          if [ "$EXTRA" != "{}" ]; then
            echo "TF_VAR_extra_app_settings=$EXTRA" >> "$GITHUB_ENV"
            echo "Injected TF_VAR_extra_app_settings from repository variables/secrets."
          else
            echo "No optional Search/Cosmos settings found in repository variables/secrets."
          fi

      - name: Terraform init
        working-directory: ./infra
        run: terraform init -no-color

      - name: Adopt existing Azure resources into Terraform state
        working-directory: ./infra
        shell: bash
        run: |
          set -euo pipefail

          SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
          PROJECT_RAW="${TF_VAR_project_name:-ragapp}"
          SLUG="$(echo "$PROJECT_RAW" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9' | cut -c1-14)"
          if [ -z "$SLUG" ]; then
            SLUG="app"
          fi

          if [ -n "${TF_VAR_name_suffix:-}" ]; then
            NAME_SUFFIX="$(echo "$TF_VAR_name_suffix" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9' | cut -c1-8)"
          else
            NAME_SUFFIX="$(printf '%s' "${SUBSCRIPTION_ID}:${SLUG}" | md5sum | cut -c1-8)"
          fi

          RG_NAME="${SLUG}-${NAME_SUFFIX}-rg"
          RG_ID="/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}"
          STORAGE_ACCOUNT_NAME="$(printf '%s' "${SLUG}${NAME_SUFFIX}" | cut -c1-24)"
          SERVICEBUS_NAMESPACE_NAME="${SLUG}-sb-${NAME_SUFFIX}"
          APP_INSIGHTS_NAME="${SLUG}-${NAME_SUFFIX}-ai"
          SWA_NAME="${SLUG}-${NAME_SUFFIX}-swa"
          FUNCTION_APP_NAME="${SLUG}-${NAME_SUFFIX}-fn"
          SERVICE_PLAN_NAME="${SLUG}-${NAME_SUFFIX}-asp"
          QUEUE_NAME="${TF_VAR_servicebus_queue_name:-processing-jobs}"
          AUTH_RULE_NAME="ingestion-functions"

          import_if_needed() {
            local address="$1"
            local id="$2"

            if terraform state show "$address" >/dev/null 2>&1; then
              echo "Already in state: $address"
              return
            fi

            if az resource show --ids "$id" >/dev/null 2>&1; then
              echo "Importing into state: $address"
              terraform import "$address" "$id"
            else
              echo "Not found in Azure (skip import): $id"
            fi
          }

          import_if_needed "azurerm_resource_group.main" "$RG_ID"

          import_if_needed \
            "azurerm_storage_account.main" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Storage/storageAccounts/${STORAGE_ACCOUNT_NAME}"

          import_if_needed \
            "azurerm_storage_container.uploads" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Storage/storageAccounts/${STORAGE_ACCOUNT_NAME}/blobServices/default/containers/uploads"

          import_if_needed \
            "azurerm_servicebus_namespace.main" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.ServiceBus/namespaces/${SERVICEBUS_NAMESPACE_NAME}"

          import_if_needed \
            "azurerm_servicebus_queue.processing" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.ServiceBus/namespaces/${SERVICEBUS_NAMESPACE_NAME}/queues/${QUEUE_NAME}"

          import_if_needed \
            "azurerm_servicebus_namespace_authorization_rule.functions" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.ServiceBus/namespaces/${SERVICEBUS_NAMESPACE_NAME}/authorizationRules/${AUTH_RULE_NAME}"

          import_if_needed \
            "azurerm_application_insights.main" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Insights/components/${APP_INSIGHTS_NAME}"

          import_if_needed \
            "azurerm_static_web_app.frontend" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Web/staticSites/${SWA_NAME}"

          import_if_needed \
            "azurerm_linux_function_app.ingestion" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Web/sites/${FUNCTION_APP_NAME}"

          if [ -z "${TF_VAR_existing_linux_service_plan_resource_id:-}" ]; then
            import_if_needed \
              "azurerm_service_plan.functions[0]" \
              "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Web/serverfarms/${SERVICE_PLAN_NAME}"
          else
            echo "Skipping azurerm_service_plan.functions[0] import (using existing Linux plan)."
          fi

      - name: Terraform plan
        working-directory: ./infra
        run: terraform plan -no-color

      - name: Terraform apply
        if: github.event_name == 'push' || inputs.terraform_apply
        working-directory: ./infra
        run: terraform apply -auto-approve -no-color

      - name: Setup Node.js
        if: github.event_name == 'push' || inputs.publish_functions
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Azure Functions Core Tools
        if: github.event_name == 'push' || inputs.publish_functions
        run: npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Install backend dependencies
        if: github.event_name == 'push' || inputs.publish_functions
        working-directory: ./backend/functions-ingestion
        run: npm ci

      - name: Build backend
        if: github.event_name == 'push' || inputs.publish_functions
        working-directory: ./backend/functions-ingestion
        run: npm run build

      - name: Publish Function App
        if: github.event_name == 'push' || inputs.publish_functions
        working-directory: ./backend/functions-ingestion
        run: |
          APP_NAME="$(terraform -chdir=../../infra output -raw function_app_name)"
          export FUNCTIONS_WORKER_RUNTIME=node
          func azure functionapp publish "$APP_NAME" --typescript
