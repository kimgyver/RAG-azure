name: Infra + Functions Deploy

on:
  workflow_dispatch:
    inputs:
      terraform_apply:
        description: "Run terraform apply"
        required: true
        default: true
        type: boolean
      publish_functions:
        description: "Build and publish Azure Functions"
        required: true
        default: true
        type: boolean
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - "backend/functions-ingestion/**"
      - ".github/workflows/infra-functions-deploy.yml"

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: "true"
      TF_VAR_app_service_plan_sku: "Y1"
      TF_VAR_project_name: ${{ vars.TF_PROJECT_NAME || 'ragapp' }}
      TF_VAR_name_suffix: ${{ vars.TF_NAME_SUFFIX }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate AZURE_CREDENTIALS secret
        run: |
          if [ -z '${{ secrets.AZURE_CREDENTIALS }}' ]; then
            echo "::error::Missing GitHub secret AZURE_CREDENTIALS"
            exit 1
          fi

          echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -e '.clientId and .clientSecret and .subscriptionId and .tenantId' >/dev/null || {
            echo "::error::AZURE_CREDENTIALS must be a JSON object with keys: clientId, clientSecret, subscriptionId, tenantId"
            exit 1
          }

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Resolve Linux App Service plan for quota-limited subscriptions
        shell: bash
        env:
          PLAN_ID_FROM_VAR: ${{ vars.EXISTING_LINUX_SERVICE_PLAN_RESOURCE_ID }}
        run: |
          set -euo pipefail

          PLAN_ID="${PLAN_ID_FROM_VAR:-}"
          if [ -n "$PLAN_ID" ]; then
            echo "Using EXISTING_LINUX_SERVICE_PLAN_RESOURCE_ID from repository variable"
            echo "TF_VAR_existing_linux_service_plan_resource_id=$PLAN_ID" >> "$GITHUB_ENV"
            exit 0
          fi

          PLAN_ID="$(az appservice plan list --query "[?reserved==\`true\`].id | [0]" -o tsv)"
          if [ -n "$PLAN_ID" ]; then
            echo "Using first discovered Linux App Service plan in subscription"
            echo "TF_VAR_existing_linux_service_plan_resource_id=$PLAN_ID" >> "$GITHUB_ENV"
          else
            echo "No existing Linux App Service plan discovered. Terraform will attempt new Y1 plan creation."
            echo "If quota error persists, set repository variable EXISTING_LINUX_SERVICE_PLAN_RESOURCE_ID."
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: ./infra
        run: terraform init -no-color

      - name: Adopt existing Azure resources into Terraform state
        working-directory: ./infra
        shell: bash
        run: |
          set -euo pipefail

          SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
          PROJECT_RAW="${TF_VAR_project_name:-ragapp}"
          SLUG="$(echo "$PROJECT_RAW" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9' | cut -c1-14)"
          if [ -z "$SLUG" ]; then
            SLUG="app"
          fi

          if [ -n "${TF_VAR_name_suffix:-}" ]; then
            NAME_SUFFIX="$(echo "$TF_VAR_name_suffix" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9' | cut -c1-8)"
          else
            NAME_SUFFIX="$(printf '%s' "${SUBSCRIPTION_ID}:${SLUG}" | md5sum | cut -c1-8)"
          fi

          RG_NAME="${SLUG}-${NAME_SUFFIX}-rg"
          RG_ID="/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}"
          STORAGE_ACCOUNT_NAME="$(printf '%s' "${SLUG}${NAME_SUFFIX}" | cut -c1-24)"
          SERVICEBUS_NAMESPACE_NAME="${SLUG}-sb-${NAME_SUFFIX}"
          APP_INSIGHTS_NAME="${SLUG}-${NAME_SUFFIX}-ai"
          SWA_NAME="${SLUG}-${NAME_SUFFIX}-swa"
          FUNCTION_APP_NAME="${SLUG}-${NAME_SUFFIX}-fn"
          SERVICE_PLAN_NAME="${SLUG}-${NAME_SUFFIX}-asp"
          QUEUE_NAME="${TF_VAR_servicebus_queue_name:-processing-jobs}"
          AUTH_RULE_NAME="ingestion-functions"

          import_if_needed() {
            local address="$1"
            local id="$2"

            if terraform state show "$address" >/dev/null 2>&1; then
              echo "Already in state: $address"
              return
            fi

            if az resource show --ids "$id" >/dev/null 2>&1; then
              echo "Importing into state: $address"
              terraform import "$address" "$id"
            else
              echo "Not found in Azure (skip import): $id"
            fi
          }

          import_if_needed "azurerm_resource_group.main" "$RG_ID"

          import_if_needed \
            "azurerm_storage_account.main" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Storage/storageAccounts/${STORAGE_ACCOUNT_NAME}"

          import_if_needed \
            "azurerm_storage_container.uploads" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Storage/storageAccounts/${STORAGE_ACCOUNT_NAME}/blobServices/default/containers/uploads"

          import_if_needed \
            "azurerm_servicebus_namespace.main" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.ServiceBus/namespaces/${SERVICEBUS_NAMESPACE_NAME}"

          import_if_needed \
            "azurerm_servicebus_queue.processing" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.ServiceBus/namespaces/${SERVICEBUS_NAMESPACE_NAME}/queues/${QUEUE_NAME}"

          import_if_needed \
            "azurerm_servicebus_namespace_authorization_rule.functions" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.ServiceBus/namespaces/${SERVICEBUS_NAMESPACE_NAME}/AuthorizationRules/${AUTH_RULE_NAME}"

          import_if_needed \
            "azurerm_application_insights.main" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Insights/components/${APP_INSIGHTS_NAME}"

          import_if_needed \
            "azurerm_static_web_app.frontend" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Web/staticSites/${SWA_NAME}"

          import_if_needed \
            "azurerm_linux_function_app.ingestion" \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Web/sites/${FUNCTION_APP_NAME}"

          if [ -z "${TF_VAR_existing_linux_service_plan_resource_id:-}" ]; then
            import_if_needed \
              "azurerm_service_plan.functions[0]" \
              "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Web/serverfarms/${SERVICE_PLAN_NAME}"
          else
            echo "Skipping azurerm_service_plan.functions[0] import (using existing Linux plan)."
          fi

      - name: Terraform plan
        working-directory: ./infra
        run: terraform plan -no-color

      - name: Terraform apply
        if: github.event_name == 'push' || inputs.terraform_apply
        working-directory: ./infra
        run: terraform apply -auto-approve -no-color

      - name: Setup Node.js
        if: github.event_name == 'push' || inputs.publish_functions
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Azure Functions Core Tools
        if: github.event_name == 'push' || inputs.publish_functions
        run: npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Install backend dependencies
        if: github.event_name == 'push' || inputs.publish_functions
        working-directory: ./backend/functions-ingestion
        run: npm ci

      - name: Build backend
        if: github.event_name == 'push' || inputs.publish_functions
        working-directory: ./backend/functions-ingestion
        run: npm run build

      - name: Publish Function App
        if: github.event_name == 'push' || inputs.publish_functions
        working-directory: ./backend/functions-ingestion
        run: |
          APP_NAME="$(terraform -chdir=../../infra output -raw function_app_name)"
          export FUNCTIONS_WORKER_RUNTIME=node
          func azure functionapp publish "$APP_NAME" --typescript
