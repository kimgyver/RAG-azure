name: Azure Static Web Apps CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/azure-static-web-apps.yml"

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      TF_PROJECT_NAME: ${{ vars.TF_PROJECT_NAME || 'ragapp' }}
      TF_NAME_SUFFIX: ${{ vars.TF_NAME_SUFFIX }}
      AZURE_CREDENTIALS_JSON: ${{ secrets.AZURE_CREDENTIALS }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve target SWA resource
        shell: bash
        env:
          SWA_NAME_FROM_VAR: ${{ vars.AZURE_STATIC_WEB_APP_NAME }}
          SWA_RG_FROM_VAR: ${{ vars.AZURE_STATIC_WEB_APP_RESOURCE_GROUP }}
        run: |
          set -euo pipefail

          if [ -n "${SWA_NAME_FROM_VAR:-}" ]; then
            SWA_NAME="$SWA_NAME_FROM_VAR"
          else
            PROJECT_RAW="${TF_PROJECT_NAME:-ragapp}"
            SLUG="$(echo "$PROJECT_RAW" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9' | cut -c1-14)"
            if [ -z "$SLUG" ]; then
              SLUG="app"
            fi

            if [ -n "${TF_NAME_SUFFIX:-}" ]; then
              NAME_SUFFIX="$(echo "$TF_NAME_SUFFIX" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9' | cut -c1-8)"
            elif [ -n "${AZURE_CREDENTIALS_JSON:-}" ]; then
              SUBSCRIPTION_ID="$(echo "$AZURE_CREDENTIALS_JSON" | jq -r '.subscriptionId // empty')"
              if [ -z "$SUBSCRIPTION_ID" ]; then
                echo "::error::AZURE_CREDENTIALS is set but subscriptionId is missing"
                exit 1
              fi
              NAME_SUFFIX="$(printf '%s' "${SUBSCRIPTION_ID}:${SLUG}" | md5sum | cut -c1-8)"
            else
              echo "::warning::Cannot derive SWA name automatically because AZURE_CREDENTIALS is missing. Set repository variable AZURE_STATIC_WEB_APP_NAME."
              NAME_SUFFIX=""
            fi

            if [ -n "$NAME_SUFFIX" ]; then
              SWA_NAME="${SLUG}-${NAME_SUFFIX}-swa"
            else
              SWA_NAME=""
            fi
          fi

          if [ -n "${SWA_RG_FROM_VAR:-}" ]; then
            SWA_RG="$SWA_RG_FROM_VAR"
          elif [ -n "${SWA_NAME:-}" ]; then
            SWA_RG="${SWA_NAME%-swa}-rg"
          else
            SWA_RG=""
          fi

          echo "SWA_NAME=$SWA_NAME" >> "$GITHUB_ENV"
          echo "SWA_RG=$SWA_RG" >> "$GITHUB_ENV"
          if [ -n "${AZURE_CREDENTIALS_JSON:-}" ]; then
            echo "HAS_AZURE_CREDENTIALS=true" >> "$GITHUB_ENV"
          else
            echo "HAS_AZURE_CREDENTIALS=false" >> "$GITHUB_ENV"
          fi
      - name: Azure login (for SWA token sync)
        if: ${{ env.HAS_AZURE_CREDENTIALS == 'true' }}
        uses: azure/login@v2
        with:
          creds: ${{ env.AZURE_CREDENTIALS_JSON }}
      - name: Resolve SWA deployment token from Azure
        if: ${{ env.HAS_AZURE_CREDENTIALS == 'true' }}
        shell: bash
        env:
          SWA_NAME_FROM_VAR: ${{ vars.AZURE_STATIC_WEB_APP_NAME }}
          SWA_RG_FROM_VAR: ${{ vars.AZURE_STATIC_WEB_APP_RESOURCE_GROUP }}
        run: |
          set -euo pipefail

          if [ -z "${SWA_NAME:-}" ] || [ -z "${SWA_RG:-}" ]; then
            echo "Skipping SWA token sync: SWA_NAME or SWA_RG is empty"
            exit 0
          fi

          if ! az staticwebapp show --name "$SWA_NAME" --resource-group "$SWA_RG" >/dev/null 2>&1; then
            echo "Static Web App not found with computed target: name=$SWA_NAME resourceGroup=$SWA_RG"

            if [ -n "${SWA_NAME_FROM_VAR:-}" ] || [ -n "${SWA_RG_FROM_VAR:-}" ]; then
              echo "::error::Repository variable target does not exist."
              echo "AZURE_STATIC_WEB_APP_NAME=${SWA_NAME_FROM_VAR:-<empty>}"
              echo "AZURE_STATIC_WEB_APP_RESOURCE_GROUP=${SWA_RG_FROM_VAR:-<empty>}"
              exit 1
            fi

            SWA_COUNT="$(az staticwebapp list --query 'length(@)' -o tsv)"
            if [ "$SWA_COUNT" = "1" ]; then
              SWA_NAME="$(az staticwebapp list --query '[0].name' -o tsv)"
              SWA_RG="$(az staticwebapp list --query '[0].resourceGroup' -o tsv)"
              echo "Auto-selected the only SWA in subscription: name=$SWA_NAME resourceGroup=$SWA_RG"
              echo "SWA_NAME=$SWA_NAME" >> "$GITHUB_ENV"
              echo "SWA_RG=$SWA_RG" >> "$GITHUB_ENV"
            else
              echo "::error::Could not auto-resolve target SWA (found $SWA_COUNT SWA resources)."
              echo "Set repository variables AZURE_STATIC_WEB_APP_NAME and AZURE_STATIC_WEB_APP_RESOURCE_GROUP."
              az staticwebapp list --query '[].{name:name,resourceGroup:resourceGroup,location:location}' -o table
              exit 1
            fi
          fi

          SWA_DEPLOYMENT_TOKEN="$(az staticwebapp secrets list --name "$SWA_NAME" --resource-group "$SWA_RG" --query properties.apiKey -o tsv)"
          if [ -z "$SWA_DEPLOYMENT_TOKEN" ]; then
            echo "::error::Failed to read SWA deployment token from Azure for $SWA_NAME"
            exit 1
          fi

          echo "SWA_DEPLOYMENT_TOKEN=$SWA_DEPLOYMENT_TOKEN" >> "$GITHUB_ENV"
      - name: Resolve frontend API base URL
        shell: bash
        env:
          API_BASE_URL_FROM_VAR: ${{ vars.VITE_API_BASE_URL }}
        run: |
          set -euo pipefail

          if [ -n "${API_BASE_URL_FROM_VAR:-}" ]; then
            BASE_URL="${API_BASE_URL_FROM_VAR%/}"
          elif [ "${HAS_AZURE_CREDENTIALS:-false}" = "true" ] && [ -n "${SWA_NAME:-}" ] && [ -n "${SWA_RG:-}" ]; then
            CANDIDATE_FN="${SWA_NAME%-swa}fn"
            if az functionapp show --name "$CANDIDATE_FN" --resource-group "$SWA_RG" >/dev/null 2>&1; then
              BASE_URL="https://${CANDIDATE_FN}.azurewebsites.net/api"
            else
              FN_COUNT="$(az functionapp list --resource-group "$SWA_RG" --query 'length(@)' -o tsv)"
              if [ "$FN_COUNT" = "1" ]; then
                FN_NAME="$(az functionapp list --resource-group "$SWA_RG" --query '[0].name' -o tsv)"
                BASE_URL="https://${FN_NAME}.azurewebsites.net/api"
              else
                echo "::warning::Could not uniquely resolve Function App in $SWA_RG (found $FN_COUNT)."
                echo "Set repository variable VITE_API_BASE_URL to the intended backend endpoint."
                exit 0
              fi
            fi
          else
            echo "::warning::VITE_API_BASE_URL not set and Azure lookup unavailable. Frontend will use its default /api base."
            exit 0
          fi

          echo "VITE_UPLOAD_API_BASE_URL=$BASE_URL" >> "$GITHUB_ENV"
          echo "VITE_API_BASE_URL=$BASE_URL" >> "$GITHUB_ENV"
      - name: Validate deploy token source
        shell: bash
        env:
          SECRET_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        run: |
          set -euo pipefail

          if [ -n "${SWA_DEPLOYMENT_TOKEN:-}" ]; then
            echo "Using deployment token resolved from Azure for $SWA_NAME"
            exit 0
          fi

          if [ -n "${SECRET_TOKEN:-}" ]; then
            echo "Using repository secret AZURE_STATIC_WEB_APPS_API_TOKEN"
            echo "If deployment fails with 'No matching Static Web App', refresh this secret from the target SWA Deployment Token."
            exit 0
          fi

          echo "::error::No deployment token available."
          echo "Provide AZURE_CREDENTIALS to auto-resolve token, or set AZURE_STATIC_WEB_APPS_API_TOKEN secret manually."
          exit 1
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: ./frontend
      - run: npm run build
        working-directory: ./frontend
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.SWA_DEPLOYMENT_TOKEN || secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend"
          output_location: "dist"
